name: Build Linux Runner Images

# =============================================================================
# Phase 1: Builds and pushes the base Linux runner image.
# Phase 2 (build-linux-py-runner.yml) builds the py-libp2p runner on top of
# this base image — only triggered after Phase 1 succeeds.
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'runner-base/Dockerfile.linux'
      - 'runner-base/entrypoint.sh'
      - '.github/workflows/build-linux-runners.yml'
  workflow_dispatch:  # allow manual trigger

env:
  REGISTRY: ghcr.io
  ORG: py-libp2p-runners
  PLATFORM: linux/amd64

jobs:
  build-base:
    name: Build runner-base:linux-latest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use PAT with write:packages scope — GITHUB_TOKEN only has read on org packages
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push base Linux image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: runner-base/Dockerfile.linux
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/runner-base:linux-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was pushed
        run: |
          echo "✅ Base Linux runner image pushed:"
          echo "   ${{ env.REGISTRY }}/${{ env.ORG }}/runner-base:linux-latest"
          echo ""
          echo "Next step: deploy EC2 runner containers using this image,"
          echo "then trigger build-linux-py-runner.yml for the py-libp2p runner."
