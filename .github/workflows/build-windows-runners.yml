name: Build Windows Runner Images

# =============================================================================
# Phase 1: Builds and pushes the base Windows runner image.
# Phase 2 (build-windows-py-runner.yml) builds the py-libp2p runner on top
# of this base image — only triggered after Phase 1 succeeds.
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'runner-base/Dockerfile.windows'
      - 'runner-base/entrypoint.ps1'
      - '.github/workflows/build-windows-runners.yml'
  workflow_dispatch:  # allow manual trigger

env:
  REGISTRY: ghcr.io
  ORG: py-libp2p-runners

jobs:
  build-base:
    name: Build runner-base:windows-latest
    runs-on: windows-2022
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build base Windows image
        run: |
          docker build `
            -f runner-base/Dockerfile.windows `
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/runner-base:windows-latest `
            .

      - name: Push base Windows image
        run: docker push ${{ env.REGISTRY }}/${{ env.ORG }}/runner-base:windows-latest

      - name: Verify image was pushed
        run: |
          Write-Host "✅ Base Windows runner image pushed:"
          Write-Host "   ${{ env.REGISTRY }}/${{ env.ORG }}/runner-base:windows-latest"
          Write-Host ""
          Write-Host "Next step: deploy Windows runner containers using this image,"
          Write-Host "then trigger build-windows-py-runner.yml for the py-libp2p runner."
        shell: pwsh
